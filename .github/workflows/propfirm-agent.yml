name: Prop Firm Data Agent

on:
  workflow_dispatch:
    inputs:
      config:
        description: Company config path
        required: false
        default: agents/propfirm-agent/companies/template.company.json
  schedule:
    - cron: "0 7 * * 1"

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run scraper
        run: npm run agent:scrape -- --config "${COMPANY_CONFIG}"
        env:
          COMPANY_CONFIG: ${{ github.event.inputs.config || 'agents/propfirm-agent/companies/template.company.json' }}
          OUTPUT_DIR: output
          SAVE_SCREENSHOTS: "false"

      - name: Upload scrape output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: propfirm-agent-output
          path: output/
          if-no-files-found: warn
